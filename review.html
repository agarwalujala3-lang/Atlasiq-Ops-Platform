<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AtlasIQ Ops | Review Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body data-page="review">
  <div class="page-shell">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark">A</div><h1>AtlasIQ <span>Ops</span></h1></div>
      <nav class="nav">
        <a class="nav-link" data-page="dashboard" href="./index.html">Home</a>
        <a class="nav-link" data-page="workspaces" href="./workspaces.html">Workspaces</a>
        <a class="nav-link" data-page="review" href="./review.html">Review & Study</a>
        <a class="nav-link" data-page="reports" href="./reports.html">Reports</a>
        <a class="nav-link" data-page="exports" href="./exports.html">Exports</a>
        <a class="nav-link" data-page="admin" href="./admin.html">Admin</a>
      </nav>
      <div class="sidebar-block">
        <div class="user-chip">
          <div class="avatar">S</div>
          <div>
            <div id="userIdentity" class="user-name">Sophia Bennett</div>
            <div id="userMeta" class="muted">L&D Leader</div>
          </div>
          <button id="logoutBtn" class="icon-btn" aria-label="Log out">x</button>
        </div>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div>
            <div class="eyebrow">Review Mode</div>
            <h2>Weak topics, spaced repetition, and progress-aware study.</h2>
          </div>
        </div>
      </header>
      <section class="review-page-grid">
        <article class="panel">
          <div class="panel-title">Weak topics</div>
          <div id="reviewCards" class="stack-grid"></div>
        </article>
        <article class="panel">
          <div class="panel-title">Study next recommendation</div>
          <div id="reviewRecommendations" class="activity-list"></div>
        </article>
        <article class="panel">
          <div class="panel-title">Quick quiz</div>
          <div id="quizList" class="quiz-list"></div>
        </article>
      </section>
    </main>
  </div>
  <script type="module" src="./review.js"></script>
</body>
</html>
